name: Deploy To Hugging Face Space

env:
  HF_SPACE_REPO: ipreencekmr/resume-tailor

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Missing required secret: HF_TOKEN"
            exit 1
          fi

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "huggingface_hub>=0.35.0"

      - name: Create or update Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ env.HF_SPACE_REPO }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_REPO"]
          api = HfApi(token=token)

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="gradio",
              exist_ok=True,
          )

          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".venv/*",
                  ".env",
                  ".env.*",
                  "__pycache__/*",
                  "runtime/*",
                  "tailored_resume.docx",
                  "*.pyc",
                  "*.pyo",
                  "*.pyd",
              ],
          )
          print(f"Deployed to https://huggingface.co/spaces/{repo_id}")
          PY
